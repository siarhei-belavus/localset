name: Release Desktop App Signed

on:
  push:
    tags:
      - "desktop-signed-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release with a signed build (e.g., 1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-desktop.yml
    with:
      channel: stable
      electron_builder_config: electron-builder.ts
      artifact_prefix: desktop-signed
      artifact_retention_days: 30
      local_only: true
      updater_enabled: true
      mac_updater_enabled: true
    secrets: inherit

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-signed-v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous desktop release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git tag -l 'desktop-signed-v*' | sort -V | grep -B1 "^${CURRENT_TAG}$" | head -1)
          if [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ] || [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=""
          fi
          echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
          echo "Current tag: ${CURRENT_TAG}"
          echo "Previous tag: ${PREVIOUS_TAG:-none}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-signed-*
          merge-multiple: true

      - name: Create stable-named copies for latest download URLs
        run: |
          cd release-artifacts
          # Create stable-named copies (without version) for /releases/latest/download/ URLs
          for file in *.dmg; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., Localset-0.0.1-arm64.dmg -> arm64)
              # x64 builds may omit the arch suffix (Localset-0.0.1.dmg), default to x64
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.dmg$/\1/')
              if [[ "$arch" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
                arch="x64"
              fi
              cp "$file" "Localset-${arch}.dmg"
              echo "Created stable copy: Localset-${arch}.dmg"
            fi
          done
          for file in *-mac.zip; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., Localset-0.0.1-arm64-mac.zip -> arm64)
              # x64 builds may omit the arch suffix (Localset-0.0.1-mac.zip), default to x64
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)-mac\.zip$/\1/')
              if [[ "$arch" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
                arch="x64"
              fi
              cp "$file" "Localset-${arch}-mac.zip"
              echo "Created stable copy: Localset-${arch}-mac.zip"
            fi
          done
          for file in *.AppImage; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., superset-0.0.1-x64.AppImage -> x64)
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.AppImage$/\1/')
              cp "$file" "Localset-${arch}.AppImage"
              echo "Created stable copy: Localset-${arch}.AppImage"
            fi
          done
          # Keep Linux updater manifest at a stable filename for generic provider lookups.
          for file in *-linux.yml; do
            if [[ -f "$file" && "$file" != "latest-linux.yml" ]]; then
              cp "$file" "latest-linux.yml"
              echo "Created stable copy: latest-linux.yml"
              break
            fi
          done
          echo "Release artifacts:"
          ls -la

      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG="${{ steps.prev_tag.outputs.previous_tag }}"
          CURRENT_TAG="${{ steps.prev_tag.outputs.current_tag }}"

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating notes from ${PREVIOUS_TAG} to ${CURRENT_TAG}"
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${CURRENT_TAG}" \
              -f previous_tag_name="${PREVIOUS_TAG}" \
              --jq '.body')
          else
            echo "No previous tag found, generating notes without comparison"
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${CURRENT_TAG}" \
              --jq '.body')
          fi

          # Write to file to preserve formatting
          echo "$NOTES" > release_notes.md
          echo "Release notes generated"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release-artifacts/* \
            --title "Localset Signed ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            --draft
